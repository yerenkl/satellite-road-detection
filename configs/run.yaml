defaults:
  - dataset: massasschusetts-roads
  - logger: wandb
  - model: unet
  - trainer: default
  - _self_


seed: 42 # Random seed
device: cuda # Device to use (cuda or cpu) if unset will use cuda if available
force_deterministic: False # Force deterministic algorithms
debug_mode: False # Debug mode
result_dir: ./results/${dataset.name}_${model.name}_${now:%Y-%m-%d_%H-%M-%S} # Directory to save results
dataset_dir: ./data

training:
  epochs: 160
  batch_size: 4
  num_workers: 4
  compile_model: False
  bce_weight: 0.5  # Weight for BCE in combined loss
  
  optimizer:
    _target_: torch.optim.Adam
    lr: 2e-4
    weight_decay: 0.0001

  loss:
    _target_: monai.losses.DiceCELoss
    sigmoid: True  
    
  scheduler:
    _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
    mode: min          
    factor: 0.2        
    patience: 10       
    min_lr: 1e-7