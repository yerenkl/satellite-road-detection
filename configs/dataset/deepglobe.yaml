defaults:
  - _self_

name: "deepglobe"

init:
  _target_: src.datasets.data_deepglobe.create_data
  file_path: "data/deepglobe"

  transforms:
    train:
      _target_: torchvision.transforms.v2.Compose
      transforms:

        # resize
        - _target_: torchvision.transforms.v2.Resize
          size: [1024, 1024]

        # horizontal flip
        - _target_: torchvision.transforms.v2.RandomHorizontalFlip
          p: 0.5

        # vertical flip
        - _target_: torchvision.transforms.v2.RandomVerticalFlip
          p: 0.5

        # diagonal flip
        - _target_: torchvision.transforms.v2.RandomRotation
          degrees: [0, 90]

        # shifting + scaling
        - _target_: torchvision.transforms.v2.RandomAffine
          degrees: 0
          translate: [0.1, 0.1]
          scale: [0.8, 1.2]

        # ambitious color jitter
        - _target_: torchvision.transforms.v2.ColorJitter
          brightness: 0.4
          contrast: 0.4
          saturation: 0.4
          hue: 0.1

    val:
      _target_: torchvision.transforms.v2.Compose
      transforms:
        - _target_: torchvision.transforms.v2.Resize
          size: [1024, 1024]

    test:
      _target_: torchvision.transforms.v2.Compose
      transforms:
        - _target_: torchvision.transforms.v2.Resize
          size: [1024, 1024]

  image_column: "sat_image_path"
  mask_column: "mask_path"
  train_split: 0.8